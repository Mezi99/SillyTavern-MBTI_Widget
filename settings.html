<div class="et-settings-drawer">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>MBTI Widget</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <div class="et-drawer-description">
                Build an evolving MBTI personality profile as you chat.
            </div>

            <div class="et-field">
                <label class="et-toggle-row" for="mbti_enabled">
                    <input type="checkbox" id="mbti_enabled" class="checkbox">
                    <span class="et-label-text">Enable MBTI Widget</span>
                </label>
            </div>

            <div class="et-field">
                <label class="et-field-label"><i class="fa-solid fa-comments"></i> Context Messages</label>
                <div class="et-range-wrapper">
                    <input type="range" id="mbti_context_messages" min="1" max="10" value="5" class="et-range">
                    <span id="mbti_context_messages_value" class="et-range-value">5</span>
                </div>
                <div class="et-hint">Number of recent messages included for context when analyzing.</div>
            </div>

        </div>
    </div>
</div>
