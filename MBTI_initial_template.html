<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --bg-main: #02040a;
    --ui-base-rgb: 212, 197, 169;
    --text-main: rgba(212, 197, 169, 0.82);
    --text-muted: rgba(212, 197, 169, 0.5);
    --border-light: rgba(212, 197, 169, 0.15);
    --border-faint: rgba(212, 197, 169, 0.1);
    --theme-gold: #d4af37;
    --theme-gold-rgb: 212, 175, 55;
    --theme-danger: #b91c1c;
    --theme-danger-light: #ef4444;
    --theme-danger-rgb: 239, 68, 68;
    --theme-active: #10b981;
    --theme-active-rgb: 16, 185, 129;
    --theme-blue: #3b82f6;
    --theme-blue-rgb: 59, 130, 246;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Raleway', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600;700&display=swap');

  /* =============================================
     PROFILE SHELL
     ============================================= */
  .profile-shell {
    background: rgba(2, 4, 10, 0.4);
    border: 1px solid var(--border-faint);
    border-radius: 8px;
    padding: 16px 12px 14px;
    overflow: hidden;
    width: 280px;
    position: relative;
  }

  /* Header row: MBTI code + magnify button */
  .profile-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .mbti-code {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(var(--ui-base-rgb), 0.35);
    text-transform: uppercase;
    transition: color 0.5s ease;
  }
  .mbti-code.is-known { color: rgba(var(--theme-gold-rgb), 0.6); }

  .magnify-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .magnify-btn:hover { opacity: 1; }
  .magnify-icon {
    width: 14px; height: 14px;
    background-color: var(--theme-gold);
    -webkit-mask-image: url('https://img.icons8.com/ios-filled/50/ffffff/search--v1.png');
    mask-image: url('https://img.icons8.com/ios-filled/50/ffffff/search--v1.png');
    -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
  }

  .profile-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(var(--ui-base-rgb), 0.3);
    text-align: center;
    margin-bottom: 5px;
  }

  .archetype-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    min-height: 22px;
    transition: all 0.6s ease;
  }

  .archetype-desc {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-style: italic;
    color: rgba(var(--ui-base-rgb), 0.5);
    text-align: center;
    margin: 4px 0 14px;
    min-height: 30px;
    transition: all 0.5s ease;
    line-height: 1.4;
    padding: 0 4px;
  }

  /* =============================================
     OCTAGON RADAR
     ============================================= */
  .octagon-wrapper {
    position: relative;
    width: 100%;
    max-width: 220px;
    margin: 0 auto 14px;
  }

  /* =============================================
     4 AXIS BARS — 2x2 grid, icon in center
     ============================================= */
  .axis-bars-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .axis-bar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .axis-track {
    position: relative;
    height: 3px;
    background: rgba(var(--ui-base-rgb), 0.1);
    border-radius: 2px;
    width: 100%;
  }

  .axis-center-mark {
    position: absolute;
    left: 50%; top: -2px; bottom: -2px;
    width: 1px;
    background: rgba(var(--ui-base-rgb), 0.25);
    transform: translateX(-50%);
    z-index: 2;
  }

  .axis-fill-left {
    position: absolute;
    right: 50%; top: 0; bottom: 0;
    border-radius: 2px 0 0 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }

  .axis-fill-right {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    border-radius: 0 2px 2px 0;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }

  .axis-icon {
    width: 14px; height: 14px;
    -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    transition: background-color 0.5s ease;
    flex-shrink: 0;
  }

  /* =============================================
     ARCHETYPE MODAL
     ============================================= */
  .arch-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(2, 4, 10, 0.92);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    padding: 20px;
  }
  .arch-overlay.is-open { opacity: 1; pointer-events: auto; }

  .arch-modal {
    width: 100%; max-width: 580px; max-height: 92vh;
    display: flex; flex-direction: column;
    border: 1px solid rgba(var(--theme-gold-rgb), 0.2);
    border-radius: 4px;
    overflow: hidden;
    transform: scale(0.97);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    background: #02040a;
  }
  .arch-overlay.is-open .arch-modal { transform: scale(1); }

  /* Illustration area */
  .arch-illustration {
    width: 100%;
    height: 200px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: #020508;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arch-illustration svg {
    width: 100%; height: 100%;
    position: absolute; inset: 0;
  }
  .arch-illustration-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, #02040a 0%, transparent 100%);
    z-index: 2;
  }

  /* Modal close button */
  .arch-close {
    position: absolute; top: 14px; right: 16px; z-index: 10;
    background: rgba(2,4,10,0.6); border: 1px solid rgba(var(--ui-base-rgb), 0.2);
    border-radius: 2px; color: rgba(var(--ui-base-rgb), 0.5);
    font-size: 20px; line-height: 1; cursor: pointer; padding: 2px 8px;
    transition: color 0.2s;
  }
  .arch-close:hover { color: var(--theme-danger-light); }

  /* Modal body */
  .arch-body {
    padding: 24px 28px 28px;
    overflow-y: auto;
    flex: 1 1 auto;
  }
  .arch-body::-webkit-scrollbar { width: 3px; }
  .arch-body::-webkit-scrollbar-thumb { background: rgba(var(--theme-gold-rgb), 0.2); }

  .arch-mbti-badge {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(var(--theme-gold-rgb), 0.5);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .arch-title {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
    transition: color 0.5s;
  }

  .arch-tagline {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-style: italic;
    color: rgba(var(--ui-base-rgb), 0.65);
    line-height: 1.5;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-faint);
  }

  /* Trait pills */
  .arch-traits {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
  }
  .arch-trait {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid;
  }

  .arch-section-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(var(--ui-base-rgb), 0.4);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .arch-section-label:first-of-type { margin-top: 0; }

  .arch-body p {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(var(--ui-base-rgb), 0.8);
  }

  .arch-bullets { display: flex; flex-direction: column; gap: 8px; }
  .arch-bullet {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13px; line-height: 1.6; color: rgba(var(--ui-base-rgb), 0.75);
  }
  .arch-bullet::before {
    content: '◈';
    color: var(--theme-gold);
    font-size: 10px;
    flex-shrink: 0;
    margin-top: 3px;
    opacity: 0.6;
  }

  /* Asset / Risk two-col */
  .arch-two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-top: 4px;
  }
  .arch-col {
    background: rgba(var(--ui-base-rgb), 0.04);
    border: 1px solid var(--border-faint);
    border-radius: 3px;
    padding: 12px 14px;
  }
  .arch-col-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .arch-col-label.is-asset { color: var(--theme-active); }
  .arch-col-label.is-risk { color: var(--theme-danger-light); }
  .arch-col p { font-size: 12px; line-height: 1.6; color: rgba(var(--ui-base-rgb), 0.7); }

  /* Famous examples */
  .arch-famous {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
  }
  .arch-famous-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(var(--theme-gold-rgb), 0.7);
    border: 1px solid rgba(var(--theme-gold-rgb), 0.2);
    padding: 3px 8px;
    border-radius: 2px;
  }

  /* Divider */
  .arch-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(var(--theme-gold-rgb), 0.2), transparent);
    margin: 20px 0;
  }
</style>
</head>
<body>

<!-- =============================================
     THE PROFILE SHELL (drop into your sidebar)
     ============================================= -->
<div class="profile-shell" id="profile-shell">

  <div class="profile-header">
    <div class="mbti-code" id="mbti-code">????</div>
    <button class="magnify-btn" id="magnify-btn" onclick="openArchModal()">
      <div class="magnify-icon"></div>
    </button>
  </div>

  <div class="profile-eyebrow">Your Nature</div>
  <div class="archetype-name" id="archetype-name" style="color: var(--theme-gold)">THE UNKNOWN</div>
  <div class="archetype-desc" id="archetype-desc">Three days. A killer in the room. What kind of person are you about to become?</div>

  <!-- OCTAGON RADAR -->
  <div class="octagon-wrapper">
    <svg id="octagon-svg" viewBox="0 0 220 220" width="100%" style="display:block;overflow:visible;position:relative;z-index:2;">
      <defs>
        <filter id="glow-radar-oct" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Octagon grid rings -->
      <g id="oct-grid" stroke="rgba(212,197,169,0.08)" stroke-width="1" fill="none">
        <!-- 4 concentric octagons at 25%, 50%, 75%, 100% -->
        <polygon id="oct-ring-100" points="110,18 167,36 202,90 202,130 167,184 110,202 53,184 18,130 18,90 53,36"/>
        <polygon id="oct-ring-75"  points="110,38 154,52 181,97 181,123 154,168 110,182 66,168 39,123 39,97 66,52"/>
        <polygon id="oct-ring-50"  points="110,58 141,68 160,103 160,117 141,152 110,162 79,152 60,117 60,103 79,68"/>
        <polygon id="oct-ring-25"  points="110,78 128,84 139,110 139,110 128,136 110,142 92,136 81,110 81,110 92,84"/>
      </g>

      <!-- Axis lines from center to each vertex -->
      <g stroke="rgba(212,197,169,0.08)" stroke-width="1">
        <line x1="110" y1="110" x2="110" y2="18"/>  <!-- REASON top -->
        <line x1="110" y1="110" x2="167" y2="36"/>  <!-- PATTERN top-right -->
        <line x1="110" y1="110" x2="202" y2="110"/> <!-- FLAME right -->
        <line x1="110" y1="110" x2="167" y2="184"/> <!-- CLUE bottom-right -->
        <line x1="110" y1="110" x2="110" y2="202"/> <!-- HEART bottom -->
        <line x1="110" y1="110" x2="53"  y2="184"/> <!-- DRIFT bottom-left -->
        <line x1="110" y1="110" x2="18"  y2="110"/> <!-- SHADOW left -->
        <line x1="110" y1="110" x2="53"  y2="36"/>  <!-- ANCHOR top-left -->
      </g>

      <!-- Vertex pole icons (small, faint) -->
      <!-- These use Icons8 mask technique at tiny size -->
      <image href="https://img.icons8.com/ios-filled/20/60a5fa/brain.png"         x="101" y="2"   width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/a78bfa/idea.png"          x="159" y="20"  width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/f97316/fire-element.png"  x="196" y="100" width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/34d399/search--v1.png"    x="159" y="182" width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/f472b6/like--v1.png"      x="101" y="198" width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/94a3b8/wind.png"          x="28"  y="182" width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/94a3b8/invisible.png"     x="2"   y="100" width="18" height="18" opacity="0.3"/>
      <image href="https://img.icons8.com/ios-filled/20/fbbf24/anchor.png"        x="28"  y="20"  width="18" height="18" opacity="0.3"/>

      <!-- Historical trail polygons (echoes) -->
      <g id="oct-trail"></g>

      <!-- Current polygon -->
      <polygon id="oct-current"
        points="110,18 167,36 202,110 167,184 110,202 53,184 18,110 53,36"
        fill="rgba(212,175,55,0.0)"
        stroke="rgba(212,175,55,0.0)"
        stroke-width="1.5"
        filter="url(#glow-radar-oct)"
        style="transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);"/>

      <!-- Vertex dots -->
      <g id="oct-dots" filter="url(#glow-radar-oct)">
        <circle id="dot-reason"  cx="110" cy="110" r="2.5" fill="#60a5fa" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-pattern" cx="110" cy="110" r="2.5" fill="#a78bfa" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-flame"   cx="110" cy="110" r="2.5" fill="#f97316" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-clue"    cx="110" cy="110" r="2.5" fill="#34d399" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-heart"   cx="110" cy="110" r="2.5" fill="#f472b6" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-drift"   cx="110" cy="110" r="2.5" fill="#94a3b8" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-shadow"  cx="110" cy="110" r="2.5" fill="#94a3b8" opacity="0" style="transition:all 0.8s ease"/>
        <circle id="dot-anchor"  cx="110" cy="110" r="2.5" fill="#fbbf24" opacity="0" style="transition:all 0.8s ease"/>
      </g>
    </svg>
  </div>

  <!-- 4 AXIS BARS — 2x2 grid, single icon in center of each track -->
  <div class="axis-bars-grid">

    <!-- Bar 1: Shadow ↔ Flame (IE) -->
    <div class="axis-bar-item">
      <div class="axis-track" id="bar-ie">
        <div class="axis-center-mark"></div>
        <div class="axis-fill-left"  id="bar-ie-left"  style="background:#94a3b8;box-shadow:0 0 6px rgba(148,163,184,0.6);width:0%"></div>
        <div class="axis-fill-right" id="bar-ie-right" style="background:#f97316;box-shadow:0 0 6px rgba(249,115,22,0.6);width:0%"></div>
        <!-- Center icon shifts color based on dominant -->
        <div id="icon-ie" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;width:12px;height:12px;background-color:#94a3b8;-webkit-mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/fire-element.png');mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/fire-element.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;transition:background-color 0.5s ease;"></div>
      </div>
    </div>

    <!-- Bar 2: Reason ↔ Heart (TF) -->
    <div class="axis-bar-item">
      <div class="axis-track" id="bar-tf">
        <div class="axis-center-mark"></div>
        <div class="axis-fill-left"  id="bar-tf-left"  style="background:#60a5fa;box-shadow:0 0 6px rgba(96,165,250,0.6);width:0%"></div>
        <div class="axis-fill-right" id="bar-tf-right" style="background:#f472b6;box-shadow:0 0 6px rgba(244,114,182,0.6);width:0%"></div>
        <div id="icon-tf" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;width:12px;height:12px;background-color:#94a3b8;-webkit-mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/like--v1.png');mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/like--v1.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;transition:background-color 0.5s ease;"></div>
      </div>
    </div>

    <!-- Bar 3: Clue ↔ Pattern (SN) -->
    <div class="axis-bar-item">
      <div class="axis-track" id="bar-sn">
        <div class="axis-center-mark"></div>
        <div class="axis-fill-left"  id="bar-sn-left"  style="background:#34d399;box-shadow:0 0 6px rgba(52,211,153,0.6);width:0%"></div>
        <div class="axis-fill-right" id="bar-sn-right" style="background:#a78bfa;box-shadow:0 0 6px rgba(167,139,250,0.6);width:0%"></div>
        <div id="icon-sn" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;width:12px;height:12px;background-color:#94a3b8;-webkit-mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/idea.png');mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/idea.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;transition:background-color 0.5s ease;"></div>
      </div>
    </div>

    <!-- Bar 4: Anchor ↔ Drift (JP) -->
    <div class="axis-bar-item">
      <div class="axis-track" id="bar-jp">
        <div class="axis-center-mark"></div>
        <div class="axis-fill-left"  id="bar-jp-left"  style="background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,0.6);width:0%"></div>
        <div class="axis-fill-right" id="bar-jp-right" style="background:#94a3b8;box-shadow:0 0 6px rgba(148,163,184,0.6);width:0%"></div>
        <div id="icon-jp" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;width:12px;height:12px;background-color:#94a3b8;-webkit-mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/wind.png');mask-image:url('https://img.icons8.com/ios-filled/50/ffffff/wind.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;transition:background-color 0.5s ease;"></div>
      </div>
    </div>

  </div><!-- /axis-bars-grid -->
</div><!-- /profile-shell -->


<!-- =============================================
     ARCHETYPE MODAL OVERLAY
     ============================================= -->
<div class="arch-overlay" id="arch-overlay">
  <div class="arch-modal" id="arch-modal">
    <div class="arch-illustration" id="arch-illustration">
      <!-- SVG injected by JS -->
      <div class="arch-illustration-overlay"></div>
      <button class="arch-close" onclick="closeArchModal()">×</button>
    </div>
    <div class="arch-body" id="arch-body">
      <!-- Content injected by JS -->
    </div>
  </div>
</div>


<!-- =============================================
     DEMO CONTROLS (remove in production)
     ============================================= -->
<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:600px;z-index:300;">

// =============================================
// OCTAGON MATH
// =============================================
function scoresToOctagonPoints(s) {
  // Each vertex is pulled from center based on its axis score
  // Vertex 0 = REASON (top):    negative tf pulls up
  // Vertex 1 = PATTERN (tr):    positive sn pulls top-right
  // Vertex 2 = FLAME (right):   positive ie pulls right
  // Vertex 3 = CLUE (br):       negative sn pulls bottom-right
  // Vertex 4 = HEART (bottom):  positive tf pulls down
  // Vertex 5 = DRIFT (bl):      positive jp pulls bottom-left
  // Vertex 6 = SHADOW (left):   negative ie pulls left
  // Vertex 7 = ANCHOR (tl):     negative jp pulls top-left

  const axisVals = [
    Math.max(0, -(s.tf || 0)) / MAX_SCORE,   // 0 REASON
    Math.max(0,  (s.sn || 0)) / MAX_SCORE,   // 1 PATTERN
    Math.max(0,  (s.ie || 0)) / MAX_SCORE,   // 2 FLAME
    Math.max(0, -(s.sn || 0)) / MAX_SCORE,   // 3 CLUE
    Math.max(0,  (s.tf || 0)) / MAX_SCORE,   // 4 HEART
    Math.max(0,  (s.jp || 0)) / MAX_SCORE,   // 5 DRIFT
    Math.max(0, -(s.ie || 0)) / MAX_SCORE,   // 6 SHADOW
    Math.max(0, -(s.jp || 0)) / MAX_SCORE,   // 7 ANCHOR
  ];

  const BASE = 8; // minimum polygon radius even at 0
  const MAX_R = 92; // max radius from center

  return VERTICES.map((v, i) => {
    const t = BASE + axisVals[i] * MAX_R;
    const dx = v.x - CENTER.x;
    const dy = v.y - CENTER.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const ratio = t / dist;
    return {
      x: CENTER.x + dx * ratio,
      y: CENTER.y + dy * ratio
    };
  });
}

function pointsToStr(pts) {
  return pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
}

// =============================================
// GET ARCHETYPE KEY from scores
// =============================================
function getArchetypeKey(s) {
  const e = (s.ie || 0) >= 0 ? 'E' : 'I';
  const n = (s.sn || 0) >= 0 ? 'N' : 'S';
  const f = (s.tf || 0) >= 0 ? 'F' : 'T';
  const p = (s.jp || 0) >= 0 ? 'P' : 'J';
  // All zero = unknown
  if (s.ie === 0 && s.tf === 0 && s.sn === 0 && s.jp === 0) return 'unknown';
  return e + n + f + p; // produces MBTI key: INTJ, ENFP, etc.
  // Wait — remap: MBTI is IE, SN, TF, JP
}

function getMBTIKey(s) {
  if (s.ie === 0 && s.tf === 0 && s.sn === 0 && s.jp === 0) return 'unknown';
  const i_e = (s.ie || 0) >= 0 ? 'E' : 'I';
  const s_n = (s.sn || 0) >= 0 ? 'N' : 'S';
  const t_f = (s.tf || 0) >= 0 ? 'F' : 'T';
  const j_p = (s.jp || 0) >= 0 ? 'P' : 'J';
  return i_e + s_n + t_f + j_p;
}

function updatePanel() {
  const key = getMBTIKey(scores);
  const arch = ARCHETYPES[key] || ARCHETYPES['unknown'];
  const MAX = MAX_SCORE;

  // Archetype name + desc
  document.getElementById('archetype-name').textContent = arch.name;
  document.getElementById('archetype-name').style.color = arch.color;
  document.getElementById('archetype-desc').textContent = arch.tagline;

  // MBTI code
  const mbtiEl = document.getElementById('mbti-code');
  mbtiEl.textContent = arch.mbti;
  if (key !== 'unknown') {
    mbtiEl.classList.add('is-known');
  } else {
    mbtiEl.classList.remove('is-known');
  }

  // Octagon polygon
  const pts = scoresToOctagonPoints(scores);
  const ptStr = pointsToStr(pts);
  const poly = document.getElementById('oct-current');
  poly.setAttribute('points', ptStr);
  poly.setAttribute('fill', `${hexToRgba(arch.color, 0.12)}`);
  poly.setAttribute('stroke', arch.color);

  // Vertex dots
  const dotIds = ['dot-reason','dot-pattern','dot-flame','dot-clue','dot-heart','dot-drift','dot-shadow','dot-anchor'];
  dotIds.forEach((id, i) => {
    const dot = document.getElementById(id);
    dot.setAttribute('cx', pts[i].x.toFixed(1));
    dot.setAttribute('cy', pts[i].y.toFixed(1));
    dot.setAttribute('opacity', '0.9');
  });

  // Trail
  trail.push(JSON.parse(JSON.stringify(scores)));
  if (trail.length > 5) trail.shift();
  const trailEl = document.getElementById('oct-trail');
  trailEl.innerHTML = trail.map((s, i) => {
    const tPts = scoresToOctagonPoints(s);
    const alpha = (i + 1) / trail.length * 0.2;
    return `<polygon points="${pointsToStr(tPts)}" fill="none" stroke="${hexToRgba(arch.color, alpha)}" stroke-width="1"/>`;
  }).join('');

  // Bars
  updateBar('ie', scores.ie, MAX);
  updateBar('tf', scores.tf, MAX);
  updateBar('sn', scores.sn, MAX);
  updateBar('jp', scores.jp, MAX);

  // Bar icon colors
  setBarIcon('icon-ie', scores.ie, '#94a3b8', '#f97316');
  setBarIcon('icon-tf', scores.tf, '#60a5fa', '#f472b6');
  setBarIcon('icon-sn', scores.sn, '#34d399', '#a78bfa');
  setBarIcon('icon-jp', scores.jp, '#fbbf24', '#94a3b8');
}

function updateBar(axis, val, max) {
  const pct = Math.abs(val) / max * 50;
  const leftEl  = document.getElementById(`bar-${axis}-left`);
  const rightEl = document.getElementById(`bar-${axis}-right`);
  if (val < 0) {
    leftEl.style.width  = pct + '%';
    rightEl.style.width = '0%';
  } else if (val > 0) {
    leftEl.style.width  = '0%';
    rightEl.style.width = pct + '%';
  } else {
    leftEl.style.width  = '0%';
    rightEl.style.width = '0%';
  }
}

function setBarIcon(id, val, negColor, posColor) {
  const el = document.getElementById(id);
  if (!el) return;
  if (val < 0) el.style.backgroundColor = negColor;
  else if (val > 0) el.style.backgroundColor = posColor;
  else el.style.backgroundColor = 'rgba(212,197,169,0.3)';
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// =============================================
// TAG APPLICATION (called from executeAction in your code)
// =============================================
function applyTag(tag) {
  switch(tag) {
    case 'shadow':  scores.ie = Math.max(-MAX_SCORE, scores.ie - 1); break;
    case 'flame':   scores.ie = Math.min( MAX_SCORE, scores.ie + 1); break;
    case 'reason':  scores.tf = Math.max(-MAX_SCORE, scores.tf - 1); break;
    case 'heart':   scores.tf = Math.min( MAX_SCORE, scores.tf + 1); break;
    case 'clue':    scores.sn = Math.max(-MAX_SCORE, scores.sn - 1); break;
    case 'pattern': scores.sn = Math.min( MAX_SCORE, scores.sn + 1); break;
    case 'anchor':  scores.jp = Math.max(-MAX_SCORE, scores.jp - 1); break;
    case 'drift':   scores.jp = Math.min( MAX_SCORE, scores.jp + 1); break;
  }
  updatePanel();
}

function resetScores() {
  scores = { ie: 0, tf: 0, sn: 0, jp: 0 };
  trail = [];
  document.getElementById('oct-trail').innerHTML = '';
  updatePanel();
}

function openArchModal() {
  const key = getMBTIKey(scores);
  const arch = ARCHETYPES[key] || ARCHETYPES['unknown'];

  // Inject illustration
  const illKey = arch.illustration || 'unknown';
  document.getElementById('arch-illustration').innerHTML =
    (ILLUSTRATIONS[illKey] || ILLUSTRATIONS['unknown']) +
    '<div class="arch-illustration-overlay"></div>' +
    '<button class="arch-close" onclick="closeArchModal()">×</button>';

  // Build body
  const traitHTML = arch.traits.map(t =>
    `<span class="arch-trait" style="color:${t.color};border-color:${t.color}40;background:${t.color}10">${t.label}</span>`
  ).join('');

  const bulletsHTML = arch.bullets.map(b =>
    `<div class="arch-bullet">${b}</div>`
  ).join('');

  const famousHTML = arch.famous.map(f =>
    `<span class="arch-famous-name">${f}</span>`
  ).join('');

  const mbtiLine = key !== 'unknown'
    ? `<div class="arch-mbti-badge">${arch.mbti} · MBTI Analog</div>`
    : '';

  const twoCol = arch.asset
    ? `<div class="arch-two-col">
        <div class="arch-col">
          <div class="arch-col-label is-asset">Greatest Asset</div>
          <p>${arch.asset}</p>
        </div>
        <div class="arch-col">
          <div class="arch-col-label is-risk">Hidden Risk</div>
          <p>${arch.risk}</p>
        </div>
       </div>`
    : '';

  const famousSection = arch.famous.length
    ? `<div class="arch-section-label">Known Examples</div>
       <div class="arch-famous">${famousHTML}</div>`
    : '';

  const investigationSection = arch.bullets.length
    ? `<div class="arch-section-label">In This Investigation</div>
       <div class="arch-bullets">${bulletsHTML}</div>
       <div class="arch-divider"></div>
       ${twoCol}
       <div class="arch-divider"></div>
       ${famousSection}`
    : '';

  document.getElementById('arch-body').innerHTML = `
    ${mbtiLine}
    <div class="arch-title" style="color:${arch.color}">${arch.name}</div>
    <div class="arch-tagline">${arch.tagline}</div>
    ${traitHTML ? `<div class="arch-traits">${traitHTML}</div>` : ''}
    ${investigationSection}
  `;

  document.getElementById('arch-overlay').classList.add('is-open');
}

function closeArchModal() {
  document.getElementById('arch-overlay').classList.remove('is-open');
}

// Close on overlay click
document.getElementById('arch-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeArchModal();
});

// =============================================
// INIT
// =============================================
updatePanel();
</script>

</body>
</html>
